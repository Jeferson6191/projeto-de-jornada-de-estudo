<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="register.css">
    <title>área login</title>
</head>
<body>
    <div class="conteiner">
        <div class="form">
        <form>
            <h2>Registrar-se</h2>
        
            <div class="conteudos">
                <label for="Username">Username</label>
                <input 
                    type="text" 
                    id="Username" 
                    name="Username" 
                    placeholder="Pedro Lucas" 
                    required
                >
                <p class="resposta_nome"></p>
            </div>

            <div class="conteudos">
                <label for="password">Senha</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Digite sua senha" 
                    required
                    minlength="6"
                >
                <p class="resposta_senha"></p>
            </div>
            <button id="submitloginbtn">Acessar Sistema</button>
            <p id="feedback"></p>
            <p style="font-size: 0.8rem; text-align: center; margin-top: 1rem;">
            </p>
            </div>
        </form>
    </div>
</body>
<script src="/js/register.js"></script>
</html>
